train_id: "0001-self-compliance-validate"
title: "Self Compliance Validate"
description: "Validate lifecycle train: planner defines plans, tester verifies contracts, coder implements, coach governs"
themes:
  - commons
primary_wagon: govern-lifecycle
participants:
  - "wagon:define-plans"
  - "wagon:verify-contracts"
  - "wagon:implement-code"
  - "wagon:govern-lifecycle"
  - "wagon:self-compliance-migration"
  - "wagon:security-patterns"
  - "wagon:enforce-structured-logging"
  - "system:atdd-cli"
sequence:
  - step: 1
    intent: "Define wagon manifests, features, and acceptance criteria"
    from: "wagon:define-plans"
    to: "wagon:self-compliance-migration"
    artifact: "commons:plan:manifest"
  - step: 2
    intent: "Generate contract schemas and RED tests from acceptance criteria"
    from: "wagon:verify-contracts"
    to: "wagon:self-compliance-migration"
    artifact: "commons:contract:schema"
  - step: 3
    intent: "Implement code to make RED tests GREEN"
    from: "wagon:implement-code"
    to: "wagon:self-compliance-migration"
    artifact: "commons:code:implementation"
  - step: 4
    intent: "Enforce structured logging conventions via AST-based coder validator"
    from: "wagon:implement-code"
    to: "wagon:enforce-structured-logging"
    artifact: "commons:compliance:logging"
  - step: 5
    intent: "Validate compliance across all phases and produce audit report"
    from: "wagon:govern-lifecycle"
    to: "system:atdd-cli"
    artifact: "commons:compliance:gate"
status: planned
