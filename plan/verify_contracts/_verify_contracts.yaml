wagon: verify-contracts
urn: "wagon:verify-contracts"
name: "Verify Contracts"
description: "Defines how to verify the system — contracts, RED tests, and telemetry artifacts"
theme: commons

subject: "agent:tester"
context: "in-red-phase, plan-artifacts-available"
action: "generates failing tests and contract schemas from acceptance criteria"
goal: "lock expected behavior before implementation begins"
outcome: "RED tests, JSON Schema contracts, and telemetry signal definitions"

features:
  - urn: "feature:verify-contracts:error-response-contract"

produce:
  - name: commons:contract:schema
    contract: null
    telemetry: null
    to: external
  - name: commons:error:response
    contract: "contracts/commons/error/response.schema.json"
    telemetry: null
    to: external

consume:
  - name: commons:plan:manifest
    from: wagon:define-plans

wmbt:
  total: 4
  C001: "Confirm error response contract schema validates canonical error payloads"
  D001: "Define error-response convention with enum-based error codes and phase guidance"
  E001: "Write compliance validator enforcing structured error responses in Python endpoints"
  K001: "Validator passes on the toolkit itself with no false positives"
