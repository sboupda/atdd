urn: "wmbt:verify-contracts:C001"
step: "confirm"
direction: "maximize"
dimension: "likelihood"
object_of_control: "error-response-contract-validity"
context_clarifier: "when error payloads must conform to a schema before enforcement can begin"
lens: "functional.effectiveness"
statement: "maximize likelihood of error-response-contract-validity when error payloads must conform to a schema before enforcement can begin"
acceptances:
  - identity:
      urn: "acc:verify-contracts:C001-UNIT-001-valid-error-accepted"
      id: "AC-UNIT-001"
      purpose: "Valid error payload passes contract schema validation"
      phase: "GREEN"
    harness:
      type: "unit"
      category: "backend"
    given:
      abstract:
        - "Error response contract schema exists at contracts/commons/error/response.schema.json"
        - "A JSON payload with status_code (int), error_code (string UPPER_SNAKE_CASE), message (string)"
    when:
      abstract: "Payload is validated against the contract schema"
    then:
      abstract:
        - "Validation passes without errors"
    metadata:
      author: "atdd:verify-contracts"
      created: "2026-03-31"

  - identity:
      urn: "acc:verify-contracts:C001-UNIT-002-invalid-error-rejected"
      id: "AC-UNIT-002"
      purpose: "Payload missing required field fails contract schema validation"
      phase: "GREEN"
    harness:
      type: "unit"
      category: "backend"
    given:
      abstract:
        - "Error response contract schema exists"
        - "A JSON payload missing required field error_code"
    when:
      abstract: "Payload is validated against the contract schema"
    then:
      abstract:
        - "Validation fails with a schema error identifying the missing field"
    metadata:
      author: "atdd:verify-contracts"
      created: "2026-03-31"

  - identity:
      urn: "acc:verify-contracts:C001-UNIT-003-details-optional"
      id: "AC-UNIT-003"
      purpose: "Valid payload without optional details field passes validation"
      phase: "GREEN"
    harness:
      type: "unit"
      category: "backend"
    given:
      abstract:
        - "Error response contract schema exists"
        - "A valid JSON payload without the details field"
    when:
      abstract: "Payload is validated against the contract schema"
    then:
      abstract:
        - "Validation passes because details is optional"
    metadata:
      author: "atdd:verify-contracts"
      created: "2026-03-31"
