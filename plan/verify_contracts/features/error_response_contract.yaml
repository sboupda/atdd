urn: "feature:verify-contracts:error-response-contract"
wagon: "wagon:verify-contracts"
description: "JSON Schema contract for structured error responses and coder compliance validator enforcing consistent error handling across all HTTP endpoints"
sizing:
  wmbts: 4
  footprint_score: 5
  footprint_size: "S"
wmbts:
  - "wmbt:verify-contracts:C001"
  - "wmbt:verify-contracts:D001"
  - "wmbt:verify-contracts:E001"
  - "wmbt:verify-contracts:C002"
components:
  backend:
    presentation:
      - type: "controllers"
        count: 0
        rationale: "No new CLI commands — validator runs via existing atdd validate coder"
    application:
      - type: "use_cases"
        count: 0
        rationale: "No new use cases — validator is a pytest module"
    domain:
      - type: "entities"
        count: 0
        rationale: "No new domain entities — validation logic is self-contained in test functions"
    integration:
      - type: "repositories"
        count: 0
        rationale: "No new persistence — contract is a JSON file, convention is YAML"
