urn: "wmbt:verify-contracts:E001"
step: "execute"
direction: "minimize"
dimension: "quantity"
object_of_control: "bare-string-error-responses"
context_clarifier: "when HTTP endpoints must return structured error payloads matching the contract"
lens: "functional.effectiveness"
statement: "minimize quantity of bare-string-error-responses when HTTP endpoints must return structured error payloads matching the contract"
acceptances:
  - identity:
      urn: "acc:verify-contracts:E001-UNIT-001-bare-string-detected"
      id: "AC-UNIT-001"
      purpose: "Validator detects bare string detail in HTTPException"
      phase: "GREEN"
    harness:
      type: "unit"
      category: "backend"
    given:
      abstract:
        - "A Python file with HTTPException(status_code=400, detail='bad request')"
    when:
      abstract: "Validator scans the file for error response patterns"
    then:
      abstract:
        - "Violation reported: bare string detail instead of structured error response"
    metadata:
      author: "atdd:verify-contracts"
      created: "2026-03-31"

  - identity:
      urn: "acc:verify-contracts:E001-UNIT-002-structured-passes"
      id: "AC-UNIT-002"
      purpose: "Validator accepts structured error response matching contract"
      phase: "GREEN"
    harness:
      type: "unit"
      category: "backend"
    given:
      abstract:
        - "A Python file raising HTTPException with a dict containing status_code, error_code, message"
    when:
      abstract: "Validator scans the file for error response patterns"
    then:
      abstract:
        - "No violation reported for structured error responses"
    metadata:
      author: "atdd:verify-contracts"
      created: "2026-03-31"
