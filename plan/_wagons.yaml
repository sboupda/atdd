wagons:
  - wagon: self-compliance-migration
    description: "Bootstrap ATDD plan artifacts, contracts, and URN traceability for the toolkit itself"
    theme: commons
    subject: "toolkit:self"
    context: "in-migration, no-plan-artifacts-exist"
    action: "creates plan, contract, and traceability artifacts for existing code"
    goal: "prove the toolkit can validate itself under its own conventions"
    outcome: "full URN chain from plan to test to code for all four agent wagons"
    path: "plan/self_compliance_migration/"
    manifest: "plan/self_compliance_migration/_self_compliance_migration.yaml"

  - wagon: govern-lifecycle
    description: "Orchestrates ATDD lifecycle, manages GitHub issues, validates phase transitions, maintains registries"
    theme: commons
    subject: "agent:coach"
    context: "in-atdd-lifecycle, phases-require-gates"
    action: "validates compliance and orchestrates phase transitions"
    goal: "ensure all agents follow ATDD conventions and quality gates"
    outcome: "audit-passing repository with traceable plan-test-code graph"
    path: "plan/govern_lifecycle/"
    manifest: "plan/govern_lifecycle/_govern_lifecycle.yaml"

  - wagon: define-plans
    description: "Defines what must be built — wagons, features, acceptance criteria, and trains"
    theme: commons
    subject: "agent:planner"
    context: "in-design-phase, no-implementation-yet"
    action: "creates plan artifacts from requirements"
    goal: "establish traceable specifications before any code is written"
    outcome: "wagon manifests, feature YAMLs, WMBTs, and train definitions"
    path: "plan/define_plans/"
    manifest: "plan/define_plans/_define_plans.yaml"

  - wagon: verify-contracts
    description: "Defines how to verify the system — contracts, RED tests, and telemetry artifacts"
    theme: commons
    subject: "agent:tester"
    context: "in-red-phase, plan-artifacts-available"
    action: "generates failing tests and contract schemas from acceptance criteria"
    goal: "lock expected behavior before implementation begins"
    outcome: "RED tests, JSON Schema contracts, and telemetry signal definitions"
    path: "plan/verify_contracts/"
    manifest: "plan/verify_contracts/_verify_contracts.yaml"

  - wagon: implement-code
    description: "Implements code that makes RED tests GREEN, then refactors to clean 4-layer architecture"
    theme: commons
    subject: "agent:coder"
    context: "in-green-phase, red-tests-available"
    action: "writes minimal code to pass tests then refactors to 4-layer architecture"
    goal: "deliver working, well-architected implementation"
    outcome: "GREEN tests passing with domain-application-integration-presentation layers"
    path: "plan/implement_code/"
    manifest: "plan/implement_code/_implement_code.yaml"

  - wagon: security-patterns
    description: "AST-based validator that scans consumer code for known-bad security patterns — SQL injection, missing auth, hardcoded secrets, XSS"
    theme: commons
    subject: "coder:security"
    context: "in-coder-phase, code-review-rules-encodable"
    action: "scans consumer code via AST and regex for security anti-patterns"
    goal: "catch security violations that code review catches but are fully automatable"
    outcome: "zero known-bad security patterns in consumer codebase"
    path: "plan/security_patterns/"
    manifest: "plan/security_patterns/_security_patterns.yaml"
