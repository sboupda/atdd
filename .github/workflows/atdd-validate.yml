# ATDD Validation Workflow (toolkit repo)
# This workflow is for the atdd toolkit repo itself.
# Consumer repos get a generated version via `atdd init`.
name: ATDD Validate

on:
  push:
    branches: [main, "feat/*", "fix/*", "refactor/*", "chore/*", "docs/*", "devops/*"]
  pull_request:
    branches: [main]
  issues:
    types: [opened, edited, closed, labeled, unlabeled]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    if: >-
      github.event_name != 'issues' ||
      contains(github.event.issue.labels.*.name, 'atdd-issue') ||
      contains(github.event.issue.labels.*.name, 'atdd-wmbt')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip3 install pytest jsonschema pyyaml

      - name: Run ATDD validators (from local src/)
        run: PYTHONPATH=src python3 -m pytest src/atdd/coach/validators/ -v --tb=short
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post result as issue comment
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ job.status }}';
            const emoji = result === 'success' ? '✅' : '❌';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${emoji} ATDD validation: **${result}**`
            });

  # ---------------------------------------------------------------------------
  # Tag + publish after merge to main
  # ---------------------------------------------------------------------------
  # Version bump is done by the agent on the PR branch BEFORE merging.
  # CI just reads the version from pyproject.toml, tags, and publishes.
  # "Require branches to be up to date" in branch protection serializes merges.
  tag-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read version and create tag
        run: |
          pip3 install pyyaml -q
          TAG=$(python3 - <<'PYEOF'
          import yaml, re, json
          cfg = yaml.safe_load(open(".atdd/config.yaml"))
          vf = cfg["release"]["version_file"]
          prefix = cfg["release"].get("tag_prefix", "v")
          if vf.endswith(".toml"):
              text = open(vf).read()
              m = re.search(r'^version\s*=\s*["\x27]([^"\x27]+)["\x27]', text, re.M)
              ver = m.group(1) if m else ""
          elif vf.endswith(".json"):
              ver = json.load(open(vf)).get("version", "")
          else:
              ver = open(vf).read().strip().split()[0]
          print(f"{prefix}{ver}")
          PYEOF
          )
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Create and push tag (idempotent)
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "CREATED=false" >> "$GITHUB_ENV"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
            echo "CREATED=true" >> "$GITHUB_ENV"
          fi

      - name: Trigger publish workflow
        if: env.CREATED == 'true'
        run: gh workflow run publish.yml --ref "$TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
