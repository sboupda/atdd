# ATDD Validation Workflow (toolkit repo)
# This workflow is for the atdd toolkit repo itself.
# Consumer repos get a generated version via `atdd init`.
name: ATDD Validate

on:
  push:
    branches: [main, "feat/*", "fix/*", "refactor/*", "chore/*", "docs/*", "devops/*"]
  pull_request:
    branches: [main]
  issues:
    types: [opened, edited, closed, labeled, unlabeled]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    if: >-
      github.event_name != 'issues' ||
      contains(github.event.issue.labels.*.name, 'atdd-issue') ||
      contains(github.event.issue.labels.*.name, 'atdd-wmbt')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip3 install pytest jsonschema pyyaml

      - name: Run ATDD validators (from local src/)
        run: PYTHONPATH=src python3 -m pytest src/atdd/coach/validators/ -v --tb=short
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  version-bump:
    name: Version bump check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check version was bumped
        run: |
          pip3 install pyyaml -q
          python3 - <<'PYEOF'
          import yaml, re, json, subprocess, sys

          cfg = yaml.safe_load(open(".atdd/config.yaml"))
          vf = cfg["release"]["version_file"]

          def read_version(content, filename):
              if filename.endswith(".toml"):
                  m = re.search(r'^version\s*=\s*["\x27]([^"\x27]+)["\x27]', content, re.M)
                  return m.group(1) if m else ""
              elif filename.endswith(".json"):
                  return json.loads(content).get("version", "")
              else:
                  return content.strip().split()[0]

          # PR branch version (current checkout)
          pr_version = read_version(open(vf).read(), vf)

          # Main branch version
          main_content = subprocess.check_output(
              ["git", "show", f"origin/main:{vf}"], text=True
          )
          main_version = read_version(main_content, vf)

          if pr_version == main_version:
              print(f"::error::Version not bumped. PR: {pr_version}, main: {main_version}")
              print(f"Bump the version in {vf} before merging.")
              sys.exit(1)
          else:
              print(f"Version bumped: {main_version} → {pr_version}")
          PYEOF

  post-comment:
    runs-on: ubuntu-latest
    needs: validate
    if: always() && github.event_name == 'issues'
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ needs.validate.result }}';
            const emoji = result === 'success' ? '✅' : '❌';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${emoji} ATDD validation: **${result}**`
            });
