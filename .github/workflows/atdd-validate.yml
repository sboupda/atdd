# ATDD Validation Workflow (toolkit repo)
# This workflow is for the atdd toolkit repo itself.
# Consumer repos get a generated version via `atdd init`.
name: ATDD Validate

on:
  push:
    branches: [main, "feat/*", "fix/*", "refactor/*", "chore/*", "docs/*", "devops/*"]
  pull_request:
    branches: [main]
  issues:
    types: [opened, edited, closed, labeled, unlabeled]

jobs:
  validate-planner:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'issues' ||
      contains(github.event.issue.labels.*.name, 'atdd-issue') ||
      contains(github.event.issue.labels.*.name, 'atdd-wmbt')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-atdd-toolkit

      - name: Install dependencies
        run: pip3 install pytest jsonschema pyyaml

      - name: Run planner validators
        run: PYTHONPATH=src python3 -m pytest src/atdd/planner/validators/ -v --tb=short
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-tester:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'issues' ||
      contains(github.event.issue.labels.*.name, 'atdd-issue') ||
      contains(github.event.issue.labels.*.name, 'atdd-wmbt')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-atdd-toolkit

      - name: Install dependencies
        run: pip3 install pytest jsonschema pyyaml

      - name: Run tester validators
        run: PYTHONPATH=src python3 -m pytest src/atdd/tester/validators/ -v --tb=short
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-coder:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'issues' ||
      contains(github.event.issue.labels.*.name, 'atdd-issue') ||
      contains(github.event.issue.labels.*.name, 'atdd-wmbt')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-atdd-toolkit

      - name: Install dependencies
        run: pip3 install pytest jsonschema pyyaml

      - name: Run coder validators
        run: PYTHONPATH=src python3 -m pytest src/atdd/coder/validators/ -v --tb=short
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-coach:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'issues' ||
      contains(github.event.issue.labels.*.name, 'atdd-issue') ||
      contains(github.event.issue.labels.*.name, 'atdd-wmbt')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-atdd-toolkit

      - name: Install dependencies
        run: pip3 install pytest jsonschema pyyaml

      - name: Run coach validators
        run: PYTHONPATH=src python3 -m pytest src/atdd/coach/validators/ -v --tb=short
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  version-bump:
    name: Version bump check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check version was bumped
        run: |
          pip3 install pyyaml -q
          python3 - <<'PYEOF'
          import yaml, re, json, subprocess, sys

          cfg = yaml.safe_load(open(".atdd/config.yaml"))
          vf = cfg["release"]["version_file"]

          def read_version(content, filename):
              if filename.endswith(".toml"):
                  m = re.search(r'^version\s*=\s*["\x27]([^"\x27]+)["\x27]', content, re.M)
                  return m.group(1) if m else ""
              elif filename.endswith(".json"):
                  return json.loads(content).get("version", "")
              else:
                  return content.strip().split()[0]

          # PR branch version (current checkout)
          pr_version = read_version(open(vf).read(), vf)

          # Main branch version
          main_content = subprocess.check_output(
              ["git", "show", f"origin/main:{vf}"], text=True
          )
          main_version = read_version(main_content, vf)

          if pr_version == main_version:
              print(f"::error::Version not bumped. PR: {pr_version}, main: {main_version}")
              print(f"Bump the version in {vf} before merging.")
              sys.exit(1)
          else:
              print(f"Version bumped: {main_version} → {pr_version}")
          PYEOF

  validate-gate:
    needs: [validate-planner, validate-tester, validate-coder, validate-coach]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      issues: write
    steps:
      - name: Check results
        run: |
          for result in "planner:${{ needs.validate-planner.result }}" \
                        "tester:${{ needs.validate-tester.result }}" \
                        "coder:${{ needs.validate-coder.result }}" \
                        "coach:${{ needs.validate-coach.result }}"; do
            phase="${result%%:*}"
            status="${result##*:}"
            if [ "$status" != "success" ] && [ "$status" != "skipped" ]; then
              echo "::error::$phase failed ($status)"
              exit 1
            fi
          done
          echo "All phases passed or were skipped"

      - name: Post comment
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const needs = ${{ toJSON(needs) }};
            const failed = Object.entries(needs)
              .filter(([, v]) => v.result !== 'success' && v.result !== 'skipped')
              .map(([k]) => k);
            const emoji = failed.length === 0 ? '✅' : '❌';
            const status = failed.length === 0 ? 'success' : 'failure';
            const detail = failed.length > 0
              ? '\nFailed: ' + failed.join(', ')
              : '';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${emoji} ATDD validation: **${status}**${detail}`
            });
