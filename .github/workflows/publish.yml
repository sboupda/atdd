# Tag + Publish after ATDD Validate succeeds on main
# Triggered automatically via workflow_run (no GITHUB_TOKEN cross-workflow issue).
# Version bump is done by the agent on the PR branch BEFORE merging.
# "Require branches to be up to date" in branch protection serializes merges.
name: Publish

on:
  workflow_run:
    workflows: ["ATDD Validate"]
    types: [completed]
    branches: [main]
  workflow_dispatch:            # manual fallback

jobs:
  tag-release:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    permissions:
      contents: write
      id-token: write           # required for PyPI Trusted Publishing
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read version and create tag
        run: |
          pip3 install pyyaml -q
          TAG=$(python3 - <<'PYEOF'
          import yaml, re, json
          cfg = yaml.safe_load(open(".atdd/config.yaml"))
          vf = cfg["release"]["version_file"]
          prefix = cfg["release"].get("tag_prefix", "v")
          if vf.endswith(".toml"):
              text = open(vf).read()
              m = re.search(r'^version\s*=\s*["\x27]([^"\x27]+)["\x27]', text, re.M)
              ver = m.group(1) if m else ""
          elif vf.endswith(".json"):
              ver = json.load(open(vf)).get("version", "")
          else:
              ver = open(vf).read().strip().split()[0]
          print(f"{prefix}{ver}")
          PYEOF
          )
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Create and push tag (idempotent)
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "CREATED=false" >> "$GITHUB_ENV"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
            echo "CREATED=true" >> "$GITHUB_ENV"
          fi

      - name: Build package
        run: |
          python -m pip install -U build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Verify PyPI publication
        id: pypi_verify
        run: |
          VERSION="${TAG#v}"
          echo "Waiting for atdd==$VERSION to appear on PyPI..."
          for i in 1 2 3 4 5 6; do
            if pip install --dry-run --no-deps "atdd==$VERSION" --index-url https://pypi.org/simple/ 2>&1 | grep -q "Would install"; then
              echo "Verified: atdd==$VERSION is available on PyPI"
              echo "pypi_status=published" >> "$GITHUB_OUTPUT"
              echo "pypi_version=$VERSION" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $i: not yet available, waiting 10s..."
            sleep 10
          done
          echo "::warning::atdd==$VERSION not found on PyPI after 60s — may still be propagating"
          echo "pypi_status=pending" >> "$GITHUB_OUTPUT"
          echo "pypi_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: env.CREATED == 'true'
        run: |
          COMMIT_SUBJECT=$(git log -1 --format='%s')
          TITLE="$TAG — $COMMIT_SUBJECT"
          PYPI_LINE=""
          if [ "$PYPI_STATUS" = "published" ]; then
            PYPI_LINE="Published to PyPI: atdd==$PYPI_VERSION"
          else
            PYPI_LINE="PyPI publication pending (may still be propagating)"
          fi
          gh release create "$TAG" --generate-notes --title "$TITLE" \
            --notes-start-tag "$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo '')" \
            || gh release create "$TAG" --title "$TITLE" --notes "$PYPI_LINE"
          # Append PyPI status to existing release body
          EXISTING_BODY=$(gh release view "$TAG" --json body --jq '.body' 2>/dev/null || echo "")
          gh release edit "$TAG" --notes "$(printf '%s\n\n---\n%s' "$EXISTING_BODY" "$PYPI_LINE")"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYPI_STATUS: ${{ steps.pypi_verify.outputs.pypi_status }}
          PYPI_VERSION: ${{ steps.pypi_verify.outputs.pypi_version }}
