version: '1.0'
release:
  version_file: pyproject.toml
  tag_prefix: v
sync:
  agents:
  - claude
init:
  skip_workflows: true
coverage:
  exceptions:
    features_without_implementation:
    - feature:self-compliance-migration:bootstrap-compliance
test_runner:
  single: conda run -n quant pytest -v {test_files} --no-header
  suite: conda run -n quant pytest -q
  check: bash scripts/check.sh
  env: null
toolkit:
  last_version: 1.53.0
github:
  repo: afokapu/atdd
  project_number: 1
  project_id: PVT_kwHOAIbyOM4BPpKf
  field_schema: atdd/coach/schemas/project_fields.schema.json
