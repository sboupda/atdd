schema_version: "1.0"
convention_id: "error-response"
name: "Error Response Convention"
description: "Structured error response patterns for all HTTP endpoints across runtimes"

purpose: |
  Defines how HTTP endpoints return error responses. All errors MUST follow
  the commons:error:response contract schema for consistent client-side handling.

contract_ref: "contracts/commons/error/response.schema.json"

rules:
  ERR-01:
    id: ERR-01
    name: "Structured error responses required"
    description: "All HTTP error responses MUST include status_code, error_code, and message"
    severity: error
    phase: GREEN
    schema_ref: "contracts/commons/error/response.schema.json"

  ERR-02:
    id: ERR-02
    name: "Enum-based error codes"
    description: "error_code MUST be UPPER_SNAKE_CASE, not freeform strings"
    severity: error
    phase: GREEN
    pattern: "^[A-Z][A-Z0-9_]+$"
    examples:
      valid:
        - "INVALID_INPUT"
        - "TIMEBANK_EXPIRED"
        - "AUTH_TOKEN_MISSING"
        - "RESOURCE_NOT_FOUND"
      invalid:
        - "invalid-input"
        - "error 404"
        - "Something went wrong"
        - "badRequest"

  ERR-03:
    id: ERR-03
    name: "No bare string error details"
    description: "HTTPException detail must be a dict matching contract, not a bare string"
    severity: error
    phase: GREEN
    anti_patterns:
      - "raise HTTPException(status_code=400, detail='bad request')"
      - "raise HTTPException(400, 'not found')"
      - "raise HTTPException(detail=f'User {user_id} not found')"
    correct_patterns:
      - |
        raise HTTPException(
            status_code=400,
            detail={
                "status_code": 400,
                "error_code": "INVALID_INPUT",
                "message": "Missing required field: name",
            }
        )
      - |
        raise HTTPException(
            status_code=404,
            detail={
                "status_code": 404,
                "error_code": "RESOURCE_NOT_FOUND",
                "message": f"User {user_id} not found",
                "details": {"user_id": user_id},
            }
        )

  ERR-04:
    id: ERR-04
    name: "Optional details for debugging context"
    description: "Use details field for structured debugging context (trace IDs, field errors, stack info)"
    severity: warning
    phase: REFACTOR
    examples:
      - |
        "details": {
            "trace_id": "abc-123",
            "field_errors": {"name": "required", "email": "invalid format"},
        }

  ERR-05:
    id: ERR-05
    name: "Per-wagon error code namespacing"
    description: "Error codes SHOULD be prefixed with wagon/domain name for uniqueness across wagons"
    severity: warning
    phase: REFACTOR
    examples:
      - "TIMEBANK_EXPIRED (wagon: burn-timebank)"
      - "AUTH_TOKEN_INVALID (wagon: authenticate-identity)"
      - "MATCH_NOT_FOUND (wagon: maintain-ux)"

error_code_format:
  pattern: "UPPER_SNAKE_CASE"
  regex: "^[A-Z][A-Z0-9_]+$"
  namespacing: "WAGON_SPECIFIC_ERROR (recommended in REFACTOR phase)"
  registry: "Per-wagon — each wagon defines its own error codes as constants"

phase_guidance:
  GREEN:
    - "ERR-01: All HTTPException calls use structured dict detail"
    - "ERR-02: Error codes are UPPER_SNAKE_CASE constants"
    - "ERR-03: No bare string detail arguments"
  REFACTOR:
    - "ERR-04: Add details field with structured debugging context"
    - "ERR-05: Namespace error codes by wagon"
    - "Consider error code enum/registry per wagon domain module"

cross_references:
  contract: "contracts/commons/error/response.schema.json"
  presentation: "presentation.convention.yaml (error_handling section)"
  validator: "test_error_response_compliance.py"
