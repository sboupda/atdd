version: "1.0"
convention_id: "coder.composition"
name: "Composition Completeness Convention"
description: "Detect unwired intra-feature vertical slices without over-failing intentionally partial features."

scope:
  v1: "Intra-feature composition completeness only"
  excludes:
    - "Cross-feature page orchestration validation"
    - "Cross-wagon SharedDependencies dependency injection validation"
    - "Runtime prop-flow analysis"

composition:
  principle: |
    Every implementation file in a source layer should be consumed by at least one
    valid downstream consumer or composition root. Candidate consumer layers are
    filtered by existing_layers_only at validation time, so missing higher layers
    do not create false positives for intentionally partial features.

  stacks:
    typescript:
      repo_root: "web/src"
      feature_detection:
        layer_directories: [domain, application, integration, presentation]
      composition_roots:
        macro:
          patterns: ["presentation/*Page.tsx", "presentation/*Container.tsx"]
          role: "Page and container orchestration"
      import_resolution:
        value_imports_only: true
        resolve_barrels: true
        path_alias_source: "tsconfig.json compilerOptions.paths"
      layer_rules:
        - spec_id: "SPEC-CODER-COMP-0001"
          source_layer: "application"
          consumer_layers: ["presentation"]
        - spec_id: "SPEC-CODER-COMP-0002"
          source_layer: "integration"
          consumer_layers: ["application"]
        - spec_id: "SPEC-CODER-COMP-0003"
          source_layer: "domain"
          consumer_layers: ["application", "integration", "presentation"]

    python:
      repo_root: "python"
      feature_detection:
        feature_src_pattern: "python/{wagon}/{feature}/src/{layer}/"
        layer_directories: [domain, application, integration, presentation]
      composition_roots:
        feature:
          pattern: "python/*/*/composition.py"
          must_consume: [domain, application, integration, presentation]  # candidate set; existing_layers_only filters absent layers at validation time
          detection: [ast_imports, setter_calls]
          role: "Feature dependency injection root"
      layer_rules:
        - spec_id: "SPEC-CODER-COMP-0001"
          source_layer: "application"
          consumer_layers: ["presentation", "composition"]
        - spec_id: "SPEC-CODER-COMP-0002"
          source_layer: "integration"
          consumer_layers: ["application", "composition"]
        - spec_id: "SPEC-CODER-COMP-0003"
          source_layer: "domain"
          consumer_layers: ["application", "integration", "presentation", "composition"]
      composition_root_rule:
        spec_id: "SPEC-CODER-COMP-0004"
        description: "composition.py must reach all existing feature layers via imports or setter wiring"

    supabase:
      repo_root: "supabase/functions"
      feature_detection:
        feature_src_pattern: "supabase/functions/{wagon}/{feature}/{layer}/"
        layer_directories: [domain, application, integration, presentation]
      composition_roots:
        entry:
          pattern: "supabase/functions/*/*/index.ts"
          role: "Thin edge-function entry point"
      import_resolution:
        value_imports_only: true
        resolve_barrels: false
      layer_rules:
        - spec_id: "SPEC-CODER-COMP-0001"
          source_layer: "application"
          consumer_layers: ["presentation"]
        - spec_id: "SPEC-CODER-COMP-0002"
          source_layer: "integration"
          consumer_layers: ["application"]
        - spec_id: "SPEC-CODER-COMP-0003"
          source_layer: "domain"
          consumer_layers: ["application", "integration", "presentation"]

rules:
  existing_layers_only: true
  minimum_consumers: 1
  cross_feature_consumption: "allowed"

exclusions:
  directories:
    - "tests"
    - "test_fixtures"
    - "node_modules"
    - "dist"
    - "commons"
    - "shared"
  file_patterns:
    - "*.test.ts"
    - "*.test.tsx"
    - "*.spec.ts"
    - "__init__.py"
    - "index.ts"
    - "index.tsx"
    - "types.ts"
  exceptions:
    - pattern: "src/**/integration/clients/fake_*.py"
      reason: "Fake clients are legitimate standalone composition targets"
