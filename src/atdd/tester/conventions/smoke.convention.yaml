version: "1.0"
name: "Smoke Test Convention"
description: "Rules for integration/smoke tests that verify deployed system behavior against real infrastructure"

# Purpose
purpose:
  description: |
    Smoke tests fill the gap between contract-level validation (train tests) and
    production monitoring. They exercise real infrastructure: HTTP endpoints,
    databases, authentication, and state mutations.

  testing_pyramid:
    unit_tests: "RED/GREEN phase — domain logic in isolation"
    contract_tests: "Train runner — schema + sequencing via trace abstraction"
    smoke_tests: "THIS CONVENTION — real HTTP + real DB + real auth"
    monitoring: "Production observability (out of scope)"

  rationale: |
    Contract-level train tests validate artifact flow but never touch real infrastructure.
    This creates a false sense of coverage. Smoke tests catch bugs that contract tests miss:
    - Circular imports that prevent server startup
    - RLS policies that silently block writes
    - Type mismatches between schema and actual database columns

# Lifecycle Position
lifecycle:
  phase: "SMOKE"
  position: "After GREEN (tests pass), before REFACTOR (clean architecture)"
  sequence: "INIT → PLANNED → RED → GREEN → SMOKE → REFACTOR → COMPLETE"
  agent: "tester"
  trigger: "GREEN phase complete — all unit/contract tests pass"

  entry_criteria:
    - "All RED tests are GREEN (passing)"
    - "Contract-level train tests pass"
    - "Server can start without errors (no circular imports, missing deps)"

  exit_criteria:
    - "All smoke tests pass against running infrastructure"
    - "Database state mutations verified (not just response shapes)"
    - "No mock imports in smoke test files"

# Smoke Test Rules
rules:
  must:
    - "Boot or connect to a real running server"
    - "Make real HTTP calls to actual endpoints"
    - "Verify actual database state mutations (not just response shapes)"
    - "Use real authentication tokens (service role or test user)"
    - "Clean up test data after execution (teardown fixtures)"
    - "Include a database assertion after every state-mutating HTTP call"

  must_not:
    - "Use mocked repositories or in-memory fakes"
    - "Rely on train_runner trace abstraction"
    - "Skip database verification after mutations"
    - "Import unittest.mock, MagicMock, patch, or vi.fn for infrastructure"
    - "Depend on test execution order (each test is self-contained)"

# File Structure
file_structure:
  description: "Smoke tests live alongside contract-level journey tests in e2e/"

  layout:
    pattern: "e2e/{train_id}/"
    smoke_suffix: "_smoke"
    rationale: "Co-locate with contract tests; suffix distinguishes test type"

  examples:
    contract_test: "e2e/3007-matchmaking/test_3007_matchmaking_paired.py"
    smoke_test: "e2e/3007-matchmaking/test_3007_matchmaking_paired_smoke.py"

  naming:
    pattern: "test_{train_id}_{slug}_smoke.py"
    description: "Same as journey test naming with _smoke suffix"
    examples:
      - "test_3007_matchmaking_paired_smoke.py"
      - "test_0025_onboarding_full_login_smoke.py"

# Header Convention
header:
  description: "Smoke test headers extend journey test headers with Smoke: marker"

  format: |
    # URN: test:train:{train_id}:{HARNESS}-{NNN}-{slug}-smoke
    # Train: train:{train_id}
    # Phase: SMOKE
    # Layer: assembly
    # Runtime: {python|supabase}
    # Smoke: true
    # Purpose: {what is verified against real infrastructure}

  rules:
    - "Phase MUST be SMOKE (not RED/GREEN/REFACTOR)"
    - "Smoke: true marker MUST be present"
    - "Layer MUST be assembly"
    - "URN slug MUST end with -smoke"

  example:
    python: |
      # URN: test:train:3007-matchmaking:E2E-001-paired-smoke
      # Train: train:3007-matchmaking
      # Phase: SMOKE
      # Layer: assembly
      # Runtime: python
      # Smoke: true
      # Purpose: Verify matchmaking creates paired match in database via real HTTP

# Test Structure
test_structure:
  description: "Smoke tests follow Given/When/Then with real infrastructure assertions"

  pattern: |
    # GIVEN: Real server running, test user authenticated, clean state
    # WHEN: Real HTTP call to actual endpoint
    # THEN: Verify HTTP response AND database state mutation

  required_assertions:
    http_response: "Status code + response body shape"
    database_state: "Query database to verify mutation persisted"

  example:
    python: |
      def test_matchmaking_creates_paired_match(live_backend, supabase_admin):
          """Smoke: POST /matchmaking/seek creates a paired match in database."""
          # GIVEN: Two authenticated players
          player_a = create_test_player(supabase_admin)
          player_b = create_test_player(supabase_admin)

          # WHEN: Both players seek a match
          resp_a = live_backend.post("/matchmaking/seek", json={"player_id": player_a.id})
          resp_b = live_backend.post("/matchmaking/seek", json={"player_id": player_b.id})

          # THEN: HTTP response is 200
          assert resp_b.status_code == 200

          # AND: Match row exists in database with both players
          match_row = supabase_admin.table("matches").select("*").eq(
              "id", resp_b.json()["match_id"]
          ).execute()
          assert len(match_row.data) == 1
          assert set(match_row.data[0]["player_ids"]) == {player_a.id, player_b.id}

# Forbidden Patterns
forbidden_patterns:
  description: "Patterns that indicate a smoke test is not truly testing real infrastructure"

  mock_imports:
    python:
      - "from unittest.mock import"
      - "from unittest import mock"
      - "import mock"
      - "@patch("
      - "MagicMock("
    typescript:
      - "vi.fn("
      - "vi.mock("
      - "jest.fn("
      - "jest.mock("

  response_only_assertions:
    description: "Tests that only check HTTP response without verifying DB state"
    indicator: "No database query after a POST/PUT/PATCH/DELETE call"
    severity: "warning"

# Coverage Requirements
coverage:
  description: "Which trains require smoke tests"

  rule: |
    Every train that has contract-level journey tests (e2e/{train_id}/) SHOULD
    also have at least one smoke test. The validator flags trains with contract
    tests but no smoke tests as coverage gaps.

  severity: "warning"
  rationale: |
    Not all trains need smoke tests immediately. The validator surfaces gaps
    so teams can prioritize. Critical user-facing trains should be covered first.

# Fixtures
fixtures:
  description: "Recommended pytest fixtures for smoke tests"

  live_backend:
    purpose: "HTTP client connected to running server"
    provides: "Base URL + authenticated session"
    configuration: "Server URL from environment variable or config"

  supabase_admin:
    purpose: "Supabase client with service_role key for DB verification"
    provides: "Direct database access for assertion queries"
    note: "Uses service_role to bypass RLS (verification only, not the test action)"

  test_player_factory:
    purpose: "Create and clean up test users"
    provides: "Authenticated test player with cleanup on teardown"

  environment:
    required_vars:
      - "SMOKE_BACKEND_URL: Base URL of running server (e.g., http://127.0.0.1:8000)"
      - "SUPABASE_URL: Supabase project URL"
      - "SUPABASE_SERVICE_ROLE_KEY: Service role key for DB verification"

# Validation (Meta-validator)
validation:
  description: "What the ATDD smoke coverage validator checks"
  location: "src/atdd/tester/validators/test_smoke_coverage.py"

  checks:
    coverage_gap:
      description: "Trains with contract tests but no smoke tests"
      severity: "warning"
      rule: "For each e2e/{train_id}/ directory with non-smoke tests, check for _smoke.py files"

    no_mock_imports:
      description: "Smoke tests must not import mocking libraries"
      severity: "error"
      rule: "Scan smoke test files for forbidden mock import patterns"

    db_assertion_present:
      description: "Smoke tests that mutate state must verify database"
      severity: "warning"
      rule: "Smoke tests with POST/PUT/PATCH/DELETE calls should include DB queries"

    header_compliance:
      description: "Smoke test headers follow convention"
      severity: "error"
      rule: "Phase: SMOKE and Smoke: true markers present in header"

# Cross-References
references:
  train_convention: "src/atdd/tester/conventions/train.convention.yaml"
  red_convention: "src/atdd/tester/conventions/red.convention.yaml"
  contract_convention: "src/atdd/tester/conventions/contract.convention.yaml"
  filename_convention: "src/atdd/tester/conventions/filename.convention.yaml"
